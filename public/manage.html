<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>试卷管理 - 资料上传系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%); min-height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    select { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); color: #e5e7eb; }
    select:focus { outline: none; border-color: #60a5fa; }
  </style>
</head>
<body class="text-white">
  <div class="container mx-auto px-4 py-8 max-w-7xl">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <a href="/up/" class="text-gray-400 hover:text-white">← 返回</a>
        <h1 class="text-2xl font-bold"><span class="bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">📚 试卷管理</span></h1>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-gray-400" id="userInfo"></span>
        <button onclick="logout()" class="text-gray-400 hover:text-white text-sm">退出</button>
      </div>
    </div>

    <div class="glass-card rounded-xl p-6 mb-6">
      <div class="flex items-center gap-4 mb-4 flex-wrap">
        <input type="text" id="searchInput" placeholder="搜索试卷名称..." class="flex-1 min-w-48 px-4 py-2 rounded-lg bg-gray-800 border border-gray-600 focus:border-cyan-400 focus:outline-none">
        <select id="filterGrade" onchange="loadPapers()" class="px-4 py-2 rounded-lg">
          <option value="">全部年级</option>
          <option value="7">初一</option>
          <option value="8">初二</option>
          <option value="9">初三</option>
        </select>
        <select id="filterSubject" onchange="loadPapers()" class="px-4 py-2 rounded-lg">
          <option value="">全部科目</option>
          <option value="1">语文</option>
          <option value="2">数学</option>
          <option value="3">英语</option>
          <option value="4">物理</option>
          <option value="5">化学</option>
        </select>
        <select id="filterType" onchange="loadPapers()" class="px-4 py-2 rounded-lg">
          <option value="">全部类型</option>
          <option value="1">月考</option>
          <option value="2">期中</option>
          <option value="3">期末</option>
          <option value="4">一模</option>
          <option value="5">二模</option>
          <option value="6">开学</option>
          <option value="7">单元</option>
        </select>
        <button onclick="searchPapers()" class="px-6 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg">搜索</button>
        <button onclick="showBatchDeleteModal()" class="px-6 py-2 bg-red-600 hover:bg-red-500 rounded-lg">🗑️ 批量删除</button>
      </div>

      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-700">
            <th class="p-3 text-left w-8"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
            <th class="p-3 text-left">标题</th>
            <th class="p-3 text-center w-20">年级</th>
            <th class="p-3 text-center w-20">科目</th>
            <th class="p-3 text-center w-24">类型</th>
            <th class="p-3 text-center w-24">下载</th>
            <th class="p-3 text-center w-32">操作</th>
          </tr>
        </thead>
        <tbody id="paperList"></tbody>
      </table>

      <div class="flex items-center justify-between mt-4">
        <span class="text-gray-400 text-sm" id="pageInfo">第 1 页</span>
        <div class="flex gap-2">
          <button onclick="prevPage()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded">上一页</button>
          <button onclick="nextPage()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded">下一页</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 批量删除确认框 -->
  <div id="deleteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-gray-800 rounded-xl p-6 max-w-md">
      <h3 class="text-lg font-bold mb-4">确认删除</h3>
      <p class="text-gray-400 mb-4">将删除 <span id="deleteCount">0</span> 个试卷，此操作不可恢复！</p>
      <input type="password" id="deletePassword" placeholder="输入管理员密码" class="w-full px-4 py-2 rounded bg-gray-700 mb-4">
      <div class="flex gap-4">
        <button onclick="confirmBatchDelete()" class="flex-1 py-2 bg-red-600 hover:bg-red-500 rounded">确认删除</button>
        <button onclick="closeDeleteModal()" class="flex-1 py-2 bg-gray-600 hover:bg-gray-500 rounded">取消</button>
      </div>
    </div>
  </div>

  <script>
    // 登录检查
    const token = localStorage.getItem('up_token');
    if (!token) {
      window.location.href = '/up/login.html';
    }

    let papers = [];
    let page = 1;
    let pageSize = 20;
    let selectedIds = new Set();

    const GRADE_NAMES = { 7: '初一', 8: '初二', 9: '初三' };
    const SUBJECT_NAMES = { 1: '语文', 2: '数学', 3: '英语', 4: '物理', 5: '化学' };
    const TYPE_NAMES = { 1: '月考', 2: '期中', 3: '期末', 4: '一模', 5: '二模', 6: '开学', 7: '单元' };

    // 验证登录状态
    async function checkAuth() {
      try {
        const res = await fetch('/up/api/check-auth', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (!data.success) {
          localStorage.removeItem('up_token');
          window.location.href = '/up/login.html';
          return;
        }
        document.getElementById('userInfo').textContent = `👤 ${data.user.username}`;
        loadPapers();
      } catch (e) {
        localStorage.removeItem('up_token');
        window.location.href = '/up/login.html';
      }
    }

    async function loadPapers() {
      try {
        const res = await fetch('/sjxz/api/papers');
        const data = await res.json();
        papers = data.papers || [];
        applyFilters();
      } catch (e) {
        console.error('加载失败:', e);
      }
    }

    function applyFilters() {
      const grade = document.getElementById('filterGrade').value;
      const subject = document.getElementById('filterSubject').value;
      const type = document.getElementById('filterType').value;
      const search = document.getElementById('searchInput').value.toLowerCase();

      let filtered = papers.filter(p => {
        if (grade && p.grade_id != grade) return false;
        if (subject && p.subject_id != subject) return false;
        if (type && p.type_id != type) return false;
        if (search && !p.title.toLowerCase().includes(search)) return false;
        return true;
      });

      renderPapers(filtered);
    }

    function searchPapers() {
      applyFilters();
    }

    function renderPapers(list) {
      const start = (page - 1) * pageSize;
      const end = start + pageSize;
      const pageData = list.slice(start, end);

      document.getElementById('pageInfo').textContent = `第 ${page} 页，共 ${list.length} 条`;
      document.getElementById('paperList').innerHTML = pageData.map(p => `
        <tr class="border-b border-gray-800 hover:bg-gray-800/50">
          <td class="p-3"><input type="checkbox" onchange="toggleSelect(${p.id})" ${selectedIds.has(p.id) ? 'checked' : ''}></td>
          <td class="p-3">${p.title}</td>
          <td class="p-3 text-center">${GRADE_NAMES[p.grade_id] || '-'}</td>
          <td class="p-3 text-center">${SUBJECT_NAMES[p.subject_id] || '-'}</td>
          <td class="p-3 text-center">${TYPE_NAMES[p.type_id] || '-'}</td>
          <td class="p-3 text-center text-gray-400">${p.download_count || 0}</td>
          <td class="p-3 text-center">
            <button onclick="downloadPaper(${p.id})" class="text-cyan-400 hover:text-cyan-300 mr-2">下载</button>
            <button onclick="deletePaper(${p.id})" class="text-red-400 hover:text-red-300">删除</button>
          </td>
        </tr>
      `).join('');
    }

    function toggleSelectAll() {
      const checked = document.getElementById('selectAll').checked;
      papers.forEach(p => {
        if (checked) selectedIds.add(p.id);
        else selectedIds.delete(p.id);
      });
      document.querySelectorAll('#paperList input[type="checkbox"]').forEach(cb => cb.checked = checked);
    }

    function toggleSelect(id) {
      if (selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
    }

    function prevPage() { if (page > 1) { page--; applyFilters(); } }
    function nextPage() { page++; applyFilters(); }

    function downloadPaper(id) {
      window.open('/sjxz/api/papers/' + id + '/download', '_blank');
    }

    async function deletePaper(id) {
      if (!confirm('确定删除此试卷？')) return;
      // 单个删除暂时用批量删除API
      selectedIds.clear();
      selectedIds.add(id);
      showBatchDeleteModal();
    }

    function showBatchDeleteModal() {
      if (selectedIds.size === 0) {
        alert('请先选择要删除的试卷');
        return;
      }
      document.getElementById('deleteCount').textContent = selectedIds.size;
      document.getElementById('deleteModal').classList.remove('hidden');
      document.getElementById('deleteModal').classList.add('flex');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.add('hidden');
      document.getElementById('deleteModal').classList.remove('flex');
      document.getElementById('deletePassword').value = '';
    }

    async function confirmBatchDelete() {
      const password = document.getElementById('deletePassword').value;
      if (!password) {
        alert('请输入密码');
        return;
      }

      try {
        const res = await fetch('/sjxz/api/admin/papers/batch/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids: Array.from(selectedIds), password })
        });
        const data = await res.json();
        if (data.success) {
          alert(`成功删除 ${data.deletedCount} 个试卷`);
          selectedIds.clear();
          closeDeleteModal();
          loadPapers();
        } else {
          alert('删除失败: ' + data.error);
        }
      } catch (e) {
        alert('删除失败: ' + e.message);
      }
    }

    async function logout() {
      await fetch('/up/api/logout', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      localStorage.removeItem('up_token');
      window.location.href = '/up/login.html';
    }

    checkAuth();
  </script>
</body>
</html>
