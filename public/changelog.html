<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新日志 - 资料上传系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans SC', sans-serif; }
    
    :root {
      --bg-primary: #0a0a1a;
      --bg-secondary: #12122a;
      --accent-cyan: #00d4ff;
      --accent-purple: #a855f7;
    }
    
    body {
      background: var(--bg-primary);
      min-height: 100vh;
    }
    
    .star-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite ease-in-out;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .version-card {
      border-left: 3px solid var(--accent-cyan);
    }
    
    .version-card:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    
    .tag {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
    }
    
    .tag-new { background: rgba(52, 211, 153, 0.2); color: #34d399; }
    .tag-update { background: rgba(96, 165, 250, 0.2); color: #60a5fa; }
    .tag-fix { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
  </style>
</head>
<body class="text-white">
  <!-- 星空背景 -->
  <div class="star-bg" id="stars"></div>
  
  <div class="content-wrapper container mx-auto px-4 py-8 max-w-4xl relative z-10">
    <!-- 顶部导航 -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <a href="/up/" class="text-gray-400 hover:text-white transition">
          ← 返回首页
        </a>
        <h1 class="text-2xl font-bold">
          <span class="bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
            📝 更新日志
          </span>
        </h1>
      </div>
    </div>
    
    <!-- 版本列表 -->
    <div class="space-y-6" id="changelog">
      <!-- 内容由JS渲染 -->
    </div>
    
    <footer class="mt-16 text-center text-gray-500 text-sm">
      <p>© 2026 资料上传系统 (up) | <a href="https://github.com/sssssk/up" class="hover:text-cyan-400">GitHub</a></p>
    </footer>
  </div>
  
  <script>
    // 更新日志数据
    const changelog = [
      {
        version: '1.0.1',
        date: '2026-03-20',
        title: '📝 更新日志页面',
        tags: ['new'],
        changes: [
          '✅ 新增更新日志页面，记录所有功能变更',
          '✅ 首页导航栏添加"更新日志"入口',
          '✅ 与首页保持一致的星空主题UI'
        ]
      },
      {
        version: '1.0.0',
        date: '2026-03-20',
        title: '🎉 首次发布',
        tags: ['new'],
        changes: [
          '✅ 批量上传试卷图片/PDF（最多20个）',
          '✅ 腾讯云OCR自动识别文字',
          '✅ AI智能提取：年级/科目/类型/地区/学校/考试名称',
          '✅ 表格批量预览+编辑',
          '✅ 一键提交到试卷库',
          '✅ 星空主题UI设计',
          '✅ 与试卷库系统同步筛选选项'
        ]
      }
    ];
    
    // 创建星空背景
    function createStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = Math.random() * 2 + 1 + 'px';
        star.style.height = star.style.width;
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
      }
    }
    
    // 渲染更新日志
    function renderChangelog() {
      const container = document.getElementById('changelog');
      
      container.innerHTML = changelog.map(item => `
        <div class="glass-card version-card rounded-lg p-6">
          <div class="flex items-center gap-4 mb-4">
            <span class="text-2xl font-bold">v${item.version}</span>
            <span class="text-gray-400">${item.date}</span>
            ${item.tags.map(tag => `<span class="tag tag-${tag}">${tag === 'new' ? '新增' : tag === 'update' ? '更新' : '修复'}</span>`).join('')}
          </div>
          <h3 class="text-xl font-semibold mb-3">${item.title}</h3>
          <ul class="space-y-2">
            ${item.changes.map(change => `<li class="text-gray-300">${change}</li>`).join('')}
          </ul>
        </div>
      `).join('');
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      createStars();
      renderChangelog();
    });
  </script>
</body>
</html>
